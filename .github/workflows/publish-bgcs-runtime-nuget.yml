name: Publish BGCS.Runtime NuGet

on:
  push:
    tags:
      - "runtime-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.2.3 or 1.2.3-preview.1)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#runtime-v}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Version is empty."
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Publishing BGCS.Runtime version ${VERSION}"

      - name: Restore
        run: dotnet restore src/BGCS.Runtime/BGCS.Runtime.csproj

      - name: Build
        run: dotnet build src/BGCS.Runtime/BGCS.Runtime.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/BGCS.Runtime/BGCS.Runtime.csproj --configuration Release --no-build --output artifacts/nuget -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.version.outputs.version }}

      - name: Push package to NuGet
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Push symbols to NuGet
        run: dotnet nuget push "artifacts/nuget/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
