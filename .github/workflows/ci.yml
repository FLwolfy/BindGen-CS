name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore BindGen-CS.sln

      - name: Build
        run: dotnet build BindGen-CS.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BindGen-CS.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results

      - name: Full test matrix workflow
        run: ./scripts/run-full-test-matrix.sh
        env:
          SKIP_RESTORE_BUILD: "1"
          CONFIGURATION: "Release"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
